<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script src="script.js" defer></script>
    <title>Tic-Tac-Toe</title>
</head>
<body>
    <section class="header">
        <div class="header-wrapper">
            <h1>Tic-Tac-Toe</h1>
        </div>
    </section>


    <section class="main-body">
        <div class="main-body-wrapper">   
            <div class="player-name-input">
                <div class="player-name-input-wrapper">
                    

                    <form name="player-name-form" id="player-name-form" method="post">
                        <button id="start-button" type="submit">Start</button>

                        <div class="input">
                            <label for="player1-name">Player 1 Name:</label>
                            <input type="text" name="player1-name" placeholder="Player 1">
                        </div>

                        <div class="input">
                            <label for="player2-name">Player 2 Name:</label>
                            <input type="text" name="player2-name" placeholder="Player 2">
                        </div>
                    </form>
                </div>
            </div>
        
            <div class="main-game-stats" style="display:none">
                <div class="score">
                    <div class="scores">
                        <p><span id="player1-name-display">Player 1</span><br>Score:<span id="player1-score-span">0</span></p>
                    </div>

                    <div class="scores">
                        <p><span id="player2-name-display">Player 2</span><br>Score:<span id="player2-score-span">0</span></p>
                    </div>

                </div>

                
                
            </div>

            <h4 class="player-turn"></h4>

            <div class="main-game-board">
            </div>
           

        </div>
    </section>


    <section class="footer">
        <div class="footer-wrapper">
            <h3>Made by KanapiyanovYerassyl</h3>
        </div>
    </section>
</body>
</html>
